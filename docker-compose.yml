# AI Investigation Platform — local dev stack
#
# Start everything:
#   docker compose up
#
# Re-push test data (e.g. after a Grafana restart):
#   docker compose restart test-data-service
#
# Run investigation-service unit tests only:
#   docker compose --profile test run --rm test
#
# Prerequisites: Ollama running locally on port 11434 (gemma4 model pulled).
# All containers are ephemeral — no application data is persisted.
# The maven-cache volume is build infrastructure only.
# Remove it with: docker volume rm lgtm_ai_maven-cache
#
# Endpoints once up:
#   Grafana UI             — http://localhost:3000   (admin / admin)
#   Loki                   — http://localhost:3100
#   Tempo                  — http://localhost:3200
#   Prometheus             — http://localhost:9090
#   OTLP HTTP              — http://localhost:4318
#   Neo4j browser          — http://localhost:7474   (neo4j / testpassword)
#   Neo4j Bolt             — bolt://localhost:7687
#   panel-service REST     — http://localhost:8081/api/panels
#   panel-service MCP      — http://localhost:8081/mcp/sse
#   investigation-service  — http://localhost:8080/api/v1/investigate
#   investigation MCP      — http://localhost:8080/mcp/sse

services:

  # ── Graph knowledge store ──────────────────────────────────────────────────
  # Neo4j 5 Community — hosts the Atlas incident graph (problem 2) and
  # dashboard feedback memories (problem 1). Vector index on Incident.embedding
  # enables semantic search; Cypher traversal expands to related entities.
  # Default password "testpassword" — local dev only.
  neo4j:
    image: neo4j:5.20-community
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol (query)
    environment:
      - NEO4J_AUTH=neo4j/testpassword
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: "no"

  # ── Observability stack ────────────────────────────────────────────────────
  # All-in-one image: Grafana + Loki + Tempo + Prometheus + OTel Collector.
  # Anonymous admin access enabled so investigation-service can publish
  # dashboards without a manually provisioned API token.
  lgtm:
    image: grafana/otel-lgtm:0.8.1
    ports:
      - "3000:3000"   # Grafana UI
      - "3100:3100"   # Loki
      - "3200:3200"   # Tempo query API
      - "4317:4317"   # OTLP gRPC (traces/metrics/logs ingest)
      - "4318:4318"   # OTLP HTTP (traces/metrics/logs ingest)
      - "9090:9090"   # Prometheus
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      # Strictly panel-only — does NOT modify or add any datasource. Just
      # provisions an AI Investigation dashboard whose Logs panel carries the
      # "Investigate with AI" link as a field-level override on the Line field.
      - ./grafana-provisioning/dashboards/ai-investigation-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/ai-investigation-provider.yaml:ro
      - ./grafana-provisioning/dashboards/ai-log-investigation.json:/ai-investigation-dashboards/ai-log-investigation.json:ro
    restart: "no"

  # ── Test data generator ────────────────────────────────────────────────────
  # On startup:
  #   1. Exports 25 synthetic Atlas incidents to /data/atlas/incidents.json
  #      (shared volume read by incident-graph-indexer)
  #   2. Pushes 5 trace+log scenarios into LGTM
  #      (NPE, TIMEOUT, DB_ERROR, MQ_ERROR, OOM)
  # Then stays idle. Restart to re-push: docker compose restart test-data-service
  test-data-service:
    build:
      context: test-data-service
      dockerfile: Dockerfile
    environment:
      - OTLP_ENDPOINT=http://lgtm:4318
      - LOKI_URL=http://lgtm:3100
      - ATLAS_EXPORT_PATH=/data/atlas/incidents.json
    volumes:
      - atlas-data:/data/atlas
    depends_on:
      - lgtm
    restart: "no"

  # ── Atlas → Neo4j knowledge graph indexer ─────────────────────────────────
  # Reads synthetic Atlas incidents from shared volume, runs Microsoft GraphRAG
  # (LLM via host Ollama) to extract entities + relationships, writes the
  # resulting graph into Neo4j. One-shot at startup; restart to re-index.
  # GraphRAG integration is implemented in Phase 1; for now this skeleton
  # verifies Neo4j connectivity and presence of the Atlas data file.
  incident-graph-indexer:
    build:
      context: incident-graph-indexer
      dockerfile: Dockerfile
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testpassword
      - ATLAS_DATA_PATH=/data/atlas/incidents.json
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EMBEDDING_PROVIDER=ollama
    volumes:
      - atlas-data:/data/atlas:ro
    depends_on:
      neo4j:
        condition: service_healthy
      test-data-service:
        condition: service_started
    restart: "no"

  # ── Panel catalogue ────────────────────────────────────────────────────────
  panel-service:
    build:
      context: panel-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    restart: "no"

  # ── Investigation pipeline ─────────────────────────────────────────────────
  # LLM calls go to Ollama on the host (gemma4).
  # Tempo / Loki / Grafana calls go to the lgtm container.
  # Panel templates fetched from panel-service.
  investigation-service:
    build:
      context: investigation-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=ollama,real-data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TEMPO_BASE_URL=http://lgtm:3200
      - LOKI_BASE_URL=http://lgtm:3100
      - GRAFANA_BASE_URL=http://lgtm:3000
      - GRAFANA_PUBLIC_BASE_URL=http://localhost:3000
      - GRAFANA_TOKEN=ignored-anonymous-auth
      - GRAFANA_FOLDER_UID=
      - PANEL_SERVICE_URL=http://panel-service:8081
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=testpassword
      - FEEDBACK_BASE_URL=http://localhost:8080
    depends_on:
      neo4j:
        condition: service_healthy
      lgtm:
        condition: service_started
      panel-service:
        condition: service_started
    restart: "no"

  # ── Unit test runner ───────────────────────────────────────────────────────
  # Activate with: docker compose --profile test run --rm test
  # Runs mvn verify (unit tests + JaCoCo) — no external services required.
  # ChatClient calls are mocked via Mockito; context loads with dummy credentials.
  test:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - type: bind
        source: ./investigation-service
        target: /workspace
      - maven-cache:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=azure-openai
      - AZURE_OPENAI_ENDPOINT=http://localhost:8089
      - AZURE_OPENAI_API_KEY=mock-key
      - PANEL_SERVICE_URL=http://localhost:8081
    command: ["mvn", "verify", "--no-transfer-progress"]
    profiles:
      - test
    restart: "no"

volumes:
  maven-cache:
  atlas-data:
